name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-and-tests:
    name: Quality and tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install project and test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[api,rag,dev]"

      - name: Lint
        run: ruff check src tests

      - name: Check formatting
        run: ruff format --check src tests

      - name: Run unit and integration tests
        run: pytest tests/unit tests/integration --no-cov -q

      - name: Validate Docker Compose configuration
        env:
          RISKLENS_API_KEY: ci-only-placeholder-not-a-secret
        run: docker compose config --quiet

  docker-build:
    name: Docker image build
    needs: quality-and-tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Build runtime image without private artifacts
        run: |
          docker build \
            --target runtime \
            --tag risklens-ai:${{ github.sha }} \
            .

      - name: Verify runtime image user and Python version
        run: |
          test "$(docker image inspect risklens-ai:${{ github.sha }} --format '{{.Config.User}}')" = "10001:10001"
          docker run --rm --entrypoint python risklens-ai:${{ github.sha }} --version
