random_seed: 42

splits:
  train: 0.70
  validation: 0.10
  calibration: 0.10
  holdout: 0.10

identifiers:
  primary_key: SK_ID_CURR
  target: TARGET

policy:
  holdout_usage: final_evaluation_only
  stratify: true

baseline:
  logistic_regression:
    regularization_c: 1.0
    maximum_iterations: 1000
    solver: lbfgs
  decision_threshold: 0.50
