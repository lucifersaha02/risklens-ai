random_seed: 42

splits:
  train: 0.70
  validation: 0.10
  calibration: 0.10
  holdout: 0.10

identifiers:
  primary_key: SK_ID_CURR
  target: TARGET

policy:
  holdout_usage: final_evaluation_only
  stratify: true

baseline:
  logistic_regression:
    regularization_c: 1.0
    maximum_iterations: 1000
    solver: lbfgs
  decision_threshold: 0.50

cross_validation:
  folds: 3
  primary_metric: average_precision

xgboost:
  n_estimators: 400
  max_depth: 4
  learning_rate: 0.03
  subsample: 0.85
  colsample_bytree: 0.85
  min_child_weight: 20
  reg_lambda: 2.0
  tree_method: hist

calibration:
  methods:
    - sigmoid
    - isotonic
  selection_fraction: 0.50
  primary_metric: brier_score
  secondary_metric: log_loss

decision_policy:
  false_negative_cost: 5.0
  false_positive_cost: 1.0
  threshold_grid:
    minimum: 0.01
    maximum: 0.50
    step: 0.005
  selection_rule: theoretical_cost_threshold

responsible_ai:
  minimum_group_size: 200
  diagnostic_groups:
    - CODE_GENDER
    - AGE_BAND
  age_bins:
    - 0
    - 30
    - 40
    - 50
    - 60
    - 100
  age_labels:
    - under_30
    - 30_to_39
    - 40_to_49
    - 50_to_59
    - 60_plus

feature_store:
  chunk_size: 500000
  output_file: full_history_features.parquet

full_history_xgboost:
  n_estimators: 500
  max_depth: 5
  learning_rate: 0.03
  subsample: 0.85
  colsample_bytree: 0.85
  min_child_weight: 20
  reg_lambda: 2.0
  tree_method: hist
